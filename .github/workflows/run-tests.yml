name: Run tests

on:
  workflow_dispatch:
  push:

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '22'
          cache: maven

      - name: Set up services
        run: cd docker-compose && bash start-docker-compose.sh

      - name: Run tests
        run: ./mvnw clean test -q
        env:
          FRONTEND_URL: http://frontend

      - name: Run Swagger coverage
        if: always()
        run: .swagger-coverage-commandline/bin/swagger-coverage-commandline -s http://localhost:4111/v3/api-docs -i target/swagger-coverage-output

      - name: Load test report history
        uses: actions/checkout@v2
        if: always()
        with:
          ref: test-report # Название ветки с историей тестов (A)
          path: previous-test-report # Имя каталога, куда скачивается история (B)

      - name: Build allure report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          gh_pages: previous-test-report # Имя каталога, куда скачали историю (B)
          allure_results: target/allure-results # Путь к каталогу с текущими (сырыми) результатами тестов
          allure_history: allure-report # Имя каталога, куда сохраняется сгенерированный отчет (C)

      - name: Save Swagger coverage report
        if: always()
        run: |
          sudo mkdir -p allure-report/swagger-coverage
          if [ -d previous-test-report/swagger-coverage ]; then
            sudo cp -r previous-test-report/swagger-coverage/* allure-report/swagger-coverage/
          fi
          sudo mkdir -p allure-report/swagger-coverage/${{ github.run_number }}
          sudo cp swagger-coverage-report.html allure-report/swagger-coverage/${{ github.run_number }}
          sudo mkdir -p allure-report/swagger-coverage/latest
          sudo cp swagger-coverage-report.html allure-report/swagger-coverage/latest/

      - name: Add Allure plugin (API Coverage)
        if: always()
        run: |
          sudo mkdir -p allure-report/plugin/swagger-coverage

          # Write plugin.json
          cat <<'EOF' | sudo tee allure-report/plugin/swagger-coverage/plugin.json
          {
            "id": "swagger-coverage",
            "name": "API Coverage",
            "jsFiles": ["index.js"],
            "cssFiles": [],
            "htmlFiles": ["index.html"]
          }
          EOF

          # Write index.html (iframe to latest swagger coverage report)
          cat <<'EOF' | sudo tee allure-report/plugin/swagger-coverage/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <title>API Coverage</title>
              <style>
                  html, body {
                      width: 100%;
                      height: 100%;
                      margin: 0;
                      padding: 0;
                      overflow: hidden;
                      background: #fff;
                  }
                  iframe {
                      width: 100%;
                      height: 100%;
                      border: none;
                  }
              </style>
          </head>
          <body>
          <iframe src="swagger-coverage/latest/swagger-coverage-report.html"></iframe>
          </body>
          </html>
          EOF

          # Write index.js (register tab)
          cat <<'EOF' | sudo tee allure-report/plugin/swagger-coverage/index.js
          'use strict';

          allure.api.addTranslation('en', {
              tab: {
                  swaggerCoverage: {
                      name: 'API coverage',
                  },
              },
          });

          allure.api.addTranslation('ru', {
              tab: {
                  swaggerCoverage: {
                      name: 'API покрытие',
                  },
              },
          });

          allure.api.addTab('swagger-coverage', {
              title: 'tab.swaggerCoverage.name',
              icon: 'fa fa-shield',
              route: 'swagger-coverage',
              onEnter: function () {
                  return new Backbone.Marionette.View({
                      className: 'pane__section',
                      template: function () {
                          return (
                              '<h3 class="pane__section-title">API coverage</h3>' +
                              '<iframe src="swagger-coverage/latest/swagger-coverage-report.html" ' +
                              'style="width:100%; height:80vh; border:none;"></iframe>'
                          );
                      },
                  });
              },
          });
          EOF

          # ensure plugin JS is loaded into the report (robust insertion before </body>)
          if ! grep -q "plugin/swagger-coverage/index.js" allure-report/index.html; then
            sudo perl -0777 -i -pe 's@(</body>)@    <script src="plugin/swagger-coverage/index.js"></script>\n$1@' allure-report/index.html
          fi

      - name: Publish test report
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: test-report # Название ветки, в которую публикуется отчет (A)
          publish_dir: allure-report # Директория, содержимое которой публикуется в ветку (C)

      - name: Stopping services
        if: always()
        run: cd docker-compose && docker compose down
