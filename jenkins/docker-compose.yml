version: "3.8"

services:
  jenkins:
    build: .
    container_name: jenkins
    ports:
      - "8081:8080"
    user: root
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/NBank:/var/jenkins_home/backend_project
    networks:
      - nbank-network
    restart: unless-stopped

volumes:
  jenkins_home:

networks:
  nbank-network:
    external: true
